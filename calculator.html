<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartCalc — Калькулятор</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark cp-navbar">
  <div class="container">
    <a class="navbar-brand cp-brand" href="index.html"><span class="brand-icon">SC</span> SmartCalc</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Вхід</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
        <li class="nav-item"><a class="nav-link active" href="calculator.html">Калькулятор</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="cp-page-main d-flex align-items-start justify-content-center pt-5">
  <div class="container">
    <div class="row justify-content-center g-4">


      <div class="col-xl-4 col-lg-5 col-md-7">
        <div class="text-center mb-3">
          <p class="cp-eyebrow">Обчислення</p>
          <h1 class="cp-headline-sm"><span class="cp-accent">Калькулятор</span></h1>
        </div>


        <div class="cp-mode-toggle mb-4">
          <button class="btn cp-mode-btn active">Звичайний</button>
          <button class="btn cp-mode-btn">Програміст</button>
        </div>

        <div class="cp-calc">

          <div class="cp-display">
            <div class="cp-display-expr">25 + 5</div>
            <div class="cp-display-result">= 30</div>
          </div>


          <div id="normalKeys" class="cp-keys">
            <button class="btn cp-key cp-key-fn">AC</button>
            <button class="cp-key cp-key-fn" onclick="toggleSign()">+/−</button>
            <button class="cp-key cp-key-fn" onclick="percent()">%</button>
            <button class="cp-key cp-key-op" onclick="op('÷')">÷</button>

            <button class="btn cp-key">7</button>
            <button class="cp-key" onclick="num('8')">8</button>
            <button class="cp-key" onclick="num('9')">9</button>
            <button class="cp-key cp-key-op" onclick="op('×')">×</button>

            <button class="cp-key" onclick="num('4')">4</button>
            <button class="cp-key" onclick="num('5')">5</button>
            <button class="cp-key" onclick="num('6')">6</button>
            <button class="cp-key cp-key-op" onclick="op('−')">−</button>

            <button class="cp-key" onclick="num('1')">1</button>
            <button class="cp-key" onclick="num('2')">2</button>
            <button class="cp-key" onclick="num('3')">3</button>
            <button class="btn cp-key cp-key-op">+</button>

            <button class="cp-key cp-key-zero" onclick="num('0')">0</button>
            <button class="cp-key" onclick="num('.')">.</button>
            <button class="cp-key cp-key-eq" onclick="calculate()">=</button>
          </div>


          <div id="progKeys" class="cp-keys" style="display:none;">
            <button class="cp-key cp-key-fn col-span-2" onclick="clearAll()">AC</button>
            <button class="cp-key cp-key-fn" onclick="backspace()">⌫</button>
            <button class="cp-key cp-key-op" onclick="op('÷')">÷</button>

            <button class="cp-key cp-key-hex" onclick="num('A')">A</button>
            <button class="cp-key cp-key-hex" onclick="num('B')">B</button>
            <button class="cp-key cp-key-hex" onclick="num('C')">C</button>
            <button class="cp-key cp-key-op" onclick="op('×')">×</button>

            <button class="cp-key cp-key-hex" onclick="num('D')">D</button>
            <button class="cp-key cp-key-hex" onclick="num('E')">E</button>
            <button class="cp-key cp-key-hex" onclick="num('F')">F</button>
            <button class="cp-key cp-key-op" onclick="op('−')">−</button>

            <button class="btn cp-key">7</button>
            <button class="cp-key" onclick="num('8')">8</button>
            <button class="cp-key" onclick="num('9')">9</button>
            <button class="cp-key cp-key-op" onclick="op('+')">+</button>

            <button class="cp-key" onclick="num('4')">4</button>
            <button class="cp-key" onclick="num('5')">5</button>
            <button class="cp-key" onclick="num('6')">6</button>
            <button class="cp-key cp-key-op" onclick="bitwiseOp('AND')">AND</button>

            <button class="cp-key" onclick="num('1')">1</button>
            <button class="cp-key" onclick="num('2')">2</button>
            <button class="cp-key" onclick="num('3')">3</button>
            <button class="cp-key cp-key-op" onclick="bitwiseOp('OR')">OR</button>

            <button class="cp-key cp-key-zero" onclick="num('0')">0</button>
            <button class="cp-key cp-key-op" onclick="bitwiseOp('XOR')">XOR</button>
            <button class="cp-key cp-key-eq" onclick="calculate()">=</button>
          </div>
        </div>
      </div>

      <div class="col-xl-3 col-lg-4 col-md-5">

        <div id="basePanel" class="cp-card mb-4">
          <h5 class="cp-card-title mb-3">Системи числення</h5>

          <div class="cp-base-row">
            <span class="cp-base-label">HEX</span>
            <span class="cp-base-val">FF</span>
          </div>

          <div class="cp-base-row">
            <span class="cp-base-label">DEC</span>
            <span class="cp-base-val">255</span>
          </div>

          <div class="cp-base-row">
            <span class="cp-base-label">OCT</span>
            <span class="cp-base-val">377</span>
          </div>

          <div class="cp-base-row">
            <span class="cp-base-label">BIN</span>
            <span class="cp-base-val">11111111</span>
          </div>
        </div>

        
        <div class="cp-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="cp-card-title mb-0">Історія</h5>
            <button class="btn cp-btn-outline btn-sm">Очистити</button>
          </div>
          <div id="history" class="cp-history">
            <div class="cp-history-item">15 + 5 = 20</div>
            <div class="cp-history-item">FF + A = 109</div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<footer class="cp-footer">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <span class="cp-brand"><span class="brand-icon">SC</span> SmartCalc</span>
    <span class="cp-footer-text">© 2026 SmartCalc. Всі права захищено.</span>
    <div class="d-flex gap-3">
      <a href="about.html" class="cp-link">Про додаток</a>
      <a href="profile.html" class="cp-link">Профіль</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
