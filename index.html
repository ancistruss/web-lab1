  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>


<nav class="navbar navbar-expand-lg navbar-dark cp-navbar">
  <div class="container">
    <a class="navbar-brand cp-brand" href="index.html">
      <span class="brand-icon">SC</span> SmartCalc
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Вхід</a></li>
        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
        <li class="nav-item"><a class="nav-link" href="calculator.html">Калькулятор</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
      </ul>
    </div>
  </div>
</nav>


<main class="cp-hero d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-4 col-md-7">
        <div class="text-center mb-4">
          <p class="cp-eyebrow">Вітаємо</p>
          <h1 class="cp-headline-sm">Увійти до <span class="cp-accent">SmartCalc</span></h1>
        </div>
        <div class="cp-card">
          <div class="mb-4">
            <label class="cp-label">Email</label>
            <input type="email" class="form-control cp-input" placeholder="you@example.com"/>
          </div>
          <div class="mb-4">
            <label class="cp-label">Пароль</label>
            <input type="password" class="form-control cp-input" placeholder="••••••••"/>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input cp-check" type="checkbox" id="remember"/>
              <label class="form-check-label cp-label" for="remember">Запам'ятати</label>
            </div>
            <a href="#" class="cp-link">Забули пароль?</a>
          </div>
          <button class="btn cp-btn-primary w-100 mb-3">Увійти</button>
          <p class="text-center cp-label mb-0">Немає акаунту? <a href="register.html" class="cp-link">Зареєструватись</a></p>
        </div>
      </div>
    </div>
  </div>
</main>


<footer class="cp-footer">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <span class="cp-brand"><span class="brand-icon">SC</span> SmartCalc</span>

    <div class="d-flex gap-3">
      <a href="about.html" class="cp-link">Про додаток</a>
      <a href="register.html" class="cp-link">Реєстрація</a>
    </div>
  </div>
</footer>
