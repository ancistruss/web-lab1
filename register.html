<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartCalc — Реєстрація</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark cp-navbar">
  <div class="container">
    <a class="navbar-brand cp-brand" href="index.html"><span class="brand-icon">SC</span> SmartCalc</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" href="index.html">Вхід</a></li>
        <li class="nav-item"><a class="nav-link active" href="register.html">Реєстрація</a></li>
        <li class="nav-item"><a class="nav-link" href="calculator.html">Калькулятор</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="cp-page-main d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-8">

        <div class="text-center mb-4">
          <p class="cp-eyebrow">Приєднуйтесь</p>
          <h1 class="cp-headline-sm">Створити <span class="cp-accent">акаунт</span></h1>
        </div>

        <div class="cp-card">
          <div class="mb-4">
            <label class="cp-label">Ім'я</label>
            <input type="text" class="form-control cp-input" placeholder="Ваше ім'я"/>
          </div>
          <div class="mb-4">
            <label class="cp-label">Email</label>
            <input type="email" class="form-control cp-input" placeholder="you@example.com"/>
          </div>

          <div class="mb-4">
            <label class="cp-label">Стать</label>
            <div class="d-flex gap-3 mt-2">
              <div class="form-check cp-radio-card flex-fill text-center">
                <input class="form-check-input visually-hidden" type="radio" name="gender" id="male" value="male"/>
                <label class="form-check-label w-100" for="male">
                  <span class="cp-radio-emoji">♂</span><br/>Чоловіча
                </label>
              </div>
              <div class="form-check cp-radio-card flex-fill text-center">
                <input class="form-check-input visually-hidden" type="radio" name="gender" id="female" value="female"/>
                <label class="form-check-label w-100" for="female">
                  <span class="cp-radio-emoji">♀</span><br/>Жіноча
                </label>
              </div>
              <div class="form-check cp-radio-card flex-fill text-center">
                <input class="form-check-input visually-hidden" type="radio" name="gender" id="other" value="other"/>
                <label class="form-check-label w-100" for="other">
                  <span class="cp-radio-emoji">◌</span><br/>Інше
                </label>
              </div>
            </div>
          </div>

          <div class="mb-4">
            <label class="cp-label">Дата народження</label>
            <input type="date" class="form-control cp-input"/>
          </div>
          <div class="mb-4">
            <label class="cp-label">Пароль</label>
            <input type="password" class="form-control cp-input" placeholder="Мінімум 8 символів"/>
          </div>
          <div class="mb-4">
            <label class="cp-label">Підтвердіть пароль</label>
            <input type="password" class="form-control cp-input" placeholder="Повторіть пароль"/>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input cp-check" type="checkbox" id="terms"/>
            <label class="form-check-label cp-label" for="terms">
              Я погоджуюсь з <a href="#" class="cp-link">умовами використання</a>
            </label>
          </div>

          <button class="btn cp-btn-primary w-100 mb-3">Зареєструватись</button>
          <p class="text-center cp-label mb-0">Вже маєте акаунт? <a href="index.html" class="cp-link">Увійти</a></p>
        </div>

      </div>
    </div>
  </div>
</main>

<footer class="cp-footer">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
    <span class="cp-brand"><span class="brand-icon">SC</span> SmartCalc</span>
    <span class="cp-footer-text">© 2026 SmartCalc. Всі права захищено.</span>
    <div class="d-flex gap-3">
      <a href="about.html" class="cp-link">Про додаток</a>
      <a href="index.html" class="cp-link">Вхід</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  

  document.querySelectorAll('.cp-radio-card input').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.cp-radio-card').forEach(c => c.classList.remove('selected'));
      radio.closest('.cp-radio-card').classList.add('selected');
    });
  });
</script>
</body>
</html>
